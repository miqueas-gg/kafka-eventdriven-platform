server:
  port: 8081 

spring:
  application:
    name: domain-service

  datasource:
    
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kafkaplatform?currentSchema=domain}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: domain

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: domain
    default-schema: domain
    create-schemas: true
    locations: classpath:db/migration
    logging:
     level:
      org.flywaydb: DEBUG