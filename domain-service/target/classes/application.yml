server:
  port: 8081 

spring:
  application:
    name: domain-service

  datasource:
    
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kafkaplatform?currentSchema=domain}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: domain

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: domain
    default-schema: domain
    create-schemas: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
management:
  server:
    port: 8082          # Puerto diferente para Actuator (8082)
  endpoints:
    web:
      exposure:
        include: health, metrics, info  # Habilitamos los necesarios
  endpoint:
    health:
      show-details: always              # Muestra estado de DB y Kafka
  metrics:
    tags:
      application: ${spring.application.name}
   
app:
  kafka:
     topic-name: domain.events